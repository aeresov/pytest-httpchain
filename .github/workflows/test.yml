name: Test

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    # Allows publish.yml to run the full lint+test suite as a release gate.
    workflow_call:

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              run: uv python install 3.13

            - name: Install dependencies
              run: uv sync

            - name: Check formatting
              run: uv run ruff format --check .

            - name: Check linting
              run: uv run ruff check .

            - name: Check types
              run: uvx ty@0.0.49 check

            - name: Check import layering
              run: uv run lint-imports

    test:
        name: Test (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.13", "3.14"]
        env:
            UV_PYTHON: ${{ matrix.python-version }}
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync --all-extras

            # `coverage run -m pytest` (not `pytest --cov`) so coverage starts before
            # pytest imports the plugin under test — otherwise every module-level line
            # of the package is imported pre-measurement and reported as a 0% floor.
            - name: Run tests with coverage
              run: |
                  uv run coverage run -m pytest tests -v
                  uv run coverage report --show-missing
                  uv run coverage xml

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.13'
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage.xml
                  fail_ci_if_error: false
                  verbose: true
