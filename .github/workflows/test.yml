name: Test

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    # Allows publish.yml to run the full lint+test suite as a release gate.
    workflow_call:

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              run: uv python install 3.13

            - name: Install dependencies
              run: uv sync

            - name: Check formatting
              run: uv run ruff format --check .

            - name: Check linting
              run: uv run ruff check .

            - name: Check types
              run: uvx ty@0.0.49 check

            - name: Check import layering
              run: uv run lint-imports

    test:
        name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                python-version: ["3.13", "3.14"]
                exclude:
                    # One Windows job (3.13) covers path semantics; the full
                    # Python matrix runs on Linux.
                    - os: windows-latest
                      python-version: "3.14"
        env:
            UV_PYTHON: ${{ matrix.python-version }}
        steps:
            - uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync --all-extras

            # `coverage run -m pytest` (not `pytest --cov`) so coverage starts before
            # pytest imports the plugin under test — otherwise every module-level line
            # of the package is imported pre-measurement and reported as a 0% floor.
            - name: Run tests with coverage
              run: |
                  uv run coverage run -m pytest tests -v
                  uv run coverage report --show-missing
                  uv run coverage xml

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
              uses: codecov/codecov-action@v7
              with:
                  files: ./coverage.xml
                  fail_ci_if_error: false
                  verbose: true

    test-lowest:
        name: Test (lowest dependency floors)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              run: uv python install 3.13

            # Resolve every direct dependency at its declared MINIMUM version,
            # so the floors in pyproject.toml are tested claims, not guesses.
            - name: Resolve lowest direct versions
              run: uv lock --resolution lowest-direct

            - name: Install dependencies
              run: uv sync --frozen --all-extras

            - name: Run tests
              run: uv run --frozen pytest tests -v
